apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: example
spec:
  version: {{ .TagName }}
  homepage: https://github.com/ogormans-deptstack/kubectl-example
  shortDescription: Generate example YAML manifests from OpenAPI v3 spec
  description: |
    Generate example Kubernetes YAML manifests from your cluster's OpenAPI v3
    spec. Instead of copy-pasting from documentation or memorizing resource
    schemas, kubectl-example reads the live OpenAPI spec and generates valid,
    apply-ready YAML for any resource type -- including CRDs.
  caveats: |
    * Requires a running cluster (reads OpenAPI v3 spec via discovery API)
    * CRD examples require the CRD to be installed in the cluster
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      {{addURIAndSha "https://github.com/ogormans-deptstack/kubectl-example/releases/download/{{ .TagName }}/kubectl-example_{{ .TagName }}_darwin_amd64.tar.gz" .TagName | indent 6 }}
      bin: kubectl-example
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      {{addURIAndSha "https://github.com/ogormans-deptstack/kubectl-example/releases/download/{{ .TagName }}/kubectl-example_{{ .TagName }}_darwin_arm64.tar.gz" .TagName | indent 6 }}
      bin: kubectl-example
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      {{addURIAndSha "https://github.com/ogormans-deptstack/kubectl-example/releases/download/{{ .TagName }}/kubectl-example_{{ .TagName }}_linux_amd64.tar.gz" .TagName | indent 6 }}
      bin: kubectl-example
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      {{addURIAndSha "https://github.com/ogormans-deptstack/kubectl-example/releases/download/{{ .TagName }}/kubectl-example_{{ .TagName }}_linux_arm64.tar.gz" .TagName | indent 6 }}
      bin: kubectl-example
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      {{addURIAndSha "https://github.com/ogormans-deptstack/kubectl-example/releases/download/{{ .TagName }}/kubectl-example_{{ .TagName }}_windows_amd64.zip" .TagName | indent 6 }}
      bin: kubectl-example.exe

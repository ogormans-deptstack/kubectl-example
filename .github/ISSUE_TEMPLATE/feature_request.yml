name: Feature Request
description: Suggest an enhancement or new feature
labels: ["kind/feature"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like to see?
      description: A clear description of the feature.
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: Why is this needed?
      description: What problem does this solve? What use case does it enable?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you have considered.

  - type: checkboxes
    id: ownership
    attributes:
      label: Contribution
      options:
        - label: I would be willing to submit a PR for this feature

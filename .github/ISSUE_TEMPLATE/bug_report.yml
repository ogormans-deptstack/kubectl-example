name: Bug Report
description: Report a bug with kubectl-example
labels: ["kind/bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I run `kubectl example Deployment`, I get...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: I expected a valid Deployment manifest with...
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `kubectl example ...`
        2. Observe output
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: kubectl-example version
      description: Output of `kubectl example --version`
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: input
    id: k8s_version
    attributes:
      label: Kubernetes version
      description: Output of `kubectl version --short`
      placeholder: "v1.33.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Windows
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, logs, or screenshots.
